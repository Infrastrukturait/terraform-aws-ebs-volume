name: keepalive

on:
  repository_dispatch:
    types: [keepalive]
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  reenable:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Re-enable disabled workflows
        shell: bash
        run: |
          set -uo pipefail

          RESULT_FILE="${RUNNER_TEMP}/keepalive-result.json"
          STARTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          enabled_count=0
          failed_count=0

          ENABLED_JSON='[]'
          FAILED_JSON='[]'

          emit_item() {
            local status="$1"
            local workflow_id="$2"
            local workflow_path="$3"
            local workflow_state="$4"
            local message="$5"

            jq -cn \
              --arg kind "item" \
              --arg status "$status" \
              --arg workflow_id "$workflow_id" \
              --arg workflow_path "$workflow_path" \
              --arg workflow_state "$workflow_state" \
              --arg message "$message" \
              '{
                kind: $kind,
                status: $status,
                workflow_id: $workflow_id,
                workflow_path: $workflow_path,
                workflow_state: $workflow_state,
                message: $message
              }' | sed 's/^/KEEPALIVE_ITEM /'
          }

          echo "Listing disabled workflows..."

          mapfile -t DISABLED < <(
            gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows" \
              --paginate \
              --jq '.workflows[]
                | select(.state=="disabled_manually" or .state=="disabled_inactivity")
                | "\(.id)\t\(.path)\t\(.state)"'
          )

          if [ "${#DISABLED[@]}" -eq 0 ]; then
            jq -cn \
              --arg kind "result" \
              --arg status "success" \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg run_id "$GITHUB_RUN_ID" \
              --arg run_url "$RUN_URL" \
              --arg started_at "$STARTED_AT" \
              --arg finished_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              '{
                kind: $kind,
                status: $status,
                repository: $repository,
                run_id: $run_id,
                run_url: $run_url,
                started_at: $started_at,
                finished_at: $finished_at,
                total_disabled_found: 0,
                enabled_count: 0,
                failed_count: 0,
                enabled: [],
                failed: []
              }' | tee "$RESULT_FILE" | sed 's/^/KEEPALIVE_RESULT /'

            echo "result_file=$RESULT_FILE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Found disabled workflows:\n'
          printf ' - %s\n' "${DISABLED[@]}"

          for row in "${DISABLED[@]}"; do
            IFS=$'\t' read -r wf_id wf_path wf_state <<<"$row"

            echo "Enabling workflow: ${wf_path} (id=${wf_id}, state=${wf_state})"

            if gh workflow enable "$wf_id" --repo "$GITHUB_REPOSITORY"; then
              enabled_count=$((enabled_count + 1))

              emit_item "success" "$wf_id" "$wf_path" "$wf_state" "workflow enabled"

              ENABLED_JSON="$(
                jq -c \
                  --arg workflow_id "$wf_id" \
                  --arg workflow_path "$wf_path" \
                  --arg workflow_state "$wf_state" \
                  '. + [{
                    workflow_id: $workflow_id,
                    workflow_path: $workflow_path,
                    workflow_state: $workflow_state
                  }]' <<<"$ENABLED_JSON"
              )"
            else
              failed_count=$((failed_count + 1))

              emit_item "error" "$wf_id" "$wf_path" "$wf_state" "failed to enable workflow"

              FAILED_JSON="$(
                jq -c \
                  --arg workflow_id "$wf_id" \
                  --arg workflow_path "$wf_path" \
                  --arg workflow_state "$wf_state" \
                  --arg message "failed to enable workflow" \
                  '. + [{
                    workflow_id: $workflow_id,
                    workflow_path: $workflow_path,
                    workflow_state: $workflow_state,
                    message: $message
                  }]' <<<"$FAILED_JSON"
              )"
            fi
          done

          if [ "$failed_count" -eq 0 ]; then
            final_status="success"
          elif [ "$enabled_count" -gt 0 ]; then
            final_status="partial"
          else
            final_status="error"
          fi

          jq -cn \
            --arg kind "result" \
            --arg status "$final_status" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_url "$RUN_URL" \
            --arg started_at "$STARTED_AT" \
            --arg finished_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --argjson total_disabled_found "${#DISABLED[@]}" \
            --argjson enabled_count "$enabled_count" \
            --argjson failed_count "$failed_count" \
            --argjson enabled "$ENABLED_JSON" \
            --argjson failed "$FAILED_JSON" \
            '{
              kind: $kind,
              status: $status,
              repository: $repository,
              run_id: $run_id,
              run_url: $run_url,
              started_at: $started_at,
              finished_at: $finished_at,
              total_disabled_found: $total_disabled_found,
              enabled_count: $enabled_count,
              failed_count: $failed_count,
              enabled: $enabled,
              failed: $failed
            }' | tee "$RESULT_FILE" | sed 's/^/KEEPALIVE_RESULT /'

          echo "result_file=$RESULT_FILE" >> "$GITHUB_OUTPUT"

          if [ "$failed_count" -gt 0 ]; then
            exit 1
          fi

      - name: Upload result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-result
          path: ${{ runner.temp }}/keepalive-result.json